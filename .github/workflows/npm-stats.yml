name: npm Download Stats

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  download-stats:
    name: Download Statistics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get package name
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Get download counts
        id: stats
        run: |
          PACKAGE_NAME=${{ steps.package.outputs.name }}
          # Use npm registry API to get download counts
          LAST_WEEK=$(curl -s "https://api.npmjs.org/downloads/point/last-week/$PACKAGE_NAME" | jq -r '.downloads')
          LAST_MONTH=$(curl -s "https://api.npmjs.org/downloads/point/last-month/$PACKAGE_NAME" | jq -r '.downloads')
          LAST_YEAR=$(curl -s "https://api.npmjs.org/downloads/point/last-year/$PACKAGE_NAME" | jq -r '.downloads')
          
          echo "last_week=$LAST_WEEK" >> $GITHUB_OUTPUT
          echo "last_month=$LAST_MONTH" >> $GITHUB_OUTPUT
          echo "last_year=$LAST_YEAR" >> $GITHUB_OUTPUT

      - name: Create summary
        run: |
          echo "## npm Download Statistics" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Period | Downloads |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Last 7 days | ${{ steps.stats.outputs.last_week }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 30 days | ${{ steps.stats.outputs.last_month }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 365 days | ${{ steps.stats.outputs.last_year }} |" >> $GITHUB_STEP_SUMMARY

